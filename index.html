<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OFFICIAL NOTICE</title>
  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', sans-serif;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: #f5f5f5;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 28px;
      letter-spacing: 3px;
    }

    .header p {
      font-size: 12px;
      color: #aaa;
    }

    .notice {
      border-bottom: 1px solid #333;
      padding: 20px 0;
      cursor: pointer;
    }

    .title {
      font-size: 16px;
      font-weight: 500;
    }

    .tag {
      font-size: 11px;
      color: #00c3ff;
      margin-right: 6px;
    }

    .date {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    .content {
      max-height: 0;
      overflow: hidden;
      transition: 0.4s;
      font-size: 14px;
      color: #ccc;
      margin-top: 10px;
      line-height: 1.6;
    }

    .notice.active .content {
      max-height: 200px;
    }

    .footer {
      text-align: center;
      margin-top: 80px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>OFFICIAL NOTICE</h1>
    <p>정은지 OFFICIAL</p>
  </div>

  <div class="notice" onclick="toggleNotice(this)">
    <div class="title">
      <span class="tag">[NOTICE]</span>
      새로운 프로젝트 관련 안내
    </div>
    <div class="date">2026.03.27</div>
    <div class="content">
      새로운 작품과 관련된 일정 및 활동이 곧 공개될 예정입니다.<br>
      많은 관심 부탁드립니다.
    </div>
  </div>

  <div class="notice" onclick="toggleNotice(this)">
    <div class="title">
      <span class="tag">[SCHEDULE]</span>
      일정 변경 안내
    </div>
    <div class="date">2026.03.25</div>
    <div class="content">
      내부 사정으로 인해 일부 일정이 변경되었습니다.<br>
      자세한 내용은 추후 공지드리겠습니다.
    </div>
  </div>

  <div class="notice" onclick="toggleNotice(this)">
    <div class="title">
      <span class="tag">[MESSAGE]</span>
      팬분들께 드리는 말씀
    </div>
    <div class="date">2026.03.20</div>
    <div class="content">
      항상 응원해주시는 모든 분들께 진심으로 감사드립니다.<br>
      더 좋은 모습으로 보답하겠습니다.
    </div>
  </div>

  <div class="footer">
    © 2026 OFFICIAL
  </div>

</div>

<script>
function toggleNotice(element) {
  element.classList.toggle("active");
}
</script>

</body>
</html>
