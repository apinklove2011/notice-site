<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JEONG EUNJI OFFICIAL</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.menu button {
  background: none;
  border: 1px solid #555;
  color: white;
  padding: 10px 20px;
  cursor: pointer;
}

.section { display: none; }
.section.active { display: block; }

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.calendar-header button {
  background: none;
  border: 1px solid #555;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
}

.week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  color: #aaa;
  font-size: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  min-height: 60px;
  font-size: 12px;
}

.today {
  border: 1px solid #00d9ff;
}

.notice { border-bottom: 1px solid #333; padding: 15px 0; }
.cheer { line-height: 1.8; }

</style>
</head>

<body>

<div class="container">

<h1>JEONG EUNJI OFFICIAL</h1>

<div class="menu">
  <button onclick="show('schedule')">📅 스케줄</button>
  <button onclick="show('notice')">📢 공지</button>
  <button onclick="show('cheer')">🎤 응원법</button>
</div>

<!-- 스케줄 -->
<div id="schedule" class="section active">

  <div class="calendar-header">
    <button onclick="prevMonth()">◀</button>
    <h2 id="monthTitle"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div class="week">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>

  <div id="calendar" class="grid"></div>

</div>

<!-- 공지 -->
<div id="notice" class="section">
  <h2>📢 NOTICE</h2>
  <div class="notice">[공지] 새로운 프로젝트 안내</div>
</div>

<!-- 응원법 -->
<div id="cheer" class="section">
  <h2>🎤 응원법</h2>
  <div class="cheer">정! 은! 지!</div>
</div>

</div>

<script>
let date = new Date();

  "2026-4-04": {
    title: "해외공연",
    detail: "Apink 8th CONCERT [The Origin : APINK] in Singapore / 오후 7시 / 싱가포르 아레나 @엑스포"
    
function renderCalendar() {
  const year = date.getFullYear();
  const month = date.getMonth();

  document.getElementById("monthTitle").innerText = `${year}년 ${month+1}월`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for(let i=0;i<firstDay;i++){
    calendar.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=lastDate;i++){
    const today = new Date();
    let isToday =
      i === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear();

    calendar.innerHTML += `<div class="day ${isToday ? 'today' : ''}">${i}</div>`;
  }
}

function prevMonth(){
  date.setMonth(date.getMonth() - 1);
  renderCalendar();
}

function nextMonth(){
  date.setMonth(date.getMonth() + 1);
  renderCalendar();
}

function show(section){
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById(section).classList.add('active');
}

    ${i}
    ${hasSchedule ? `<br><span>${hasSchedule.title}</span>` : ""}
  </div>
`;
</script>

</body>
</html>
