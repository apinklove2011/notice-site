<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JEONG EUNJI OFFICIAL</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.menu button {
  background: none;
  border: 1px solid #555;
  color: white;
  padding: 10px 20px;
  cursor: pointer;
}

.section { display: none; }
.section.active { display: block; }

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.calendar-header button {
  background: none;
  border: 1px solid #555;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
}

.week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  color: #aaa;
  font-size: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  min-height: 60px;
  font-size: 12px;
  cursor: pointer;
}

.today {
  border: 1px solid #00d9ff;
}

.notice { border-bottom: 1px solid #333; padding: 15px 0; }
.cheer { line-height: 1.8; }

#eventDetail {
  margin-top: 20px;
  border-top: 1px solid #333;
  padding-top: 15px;
}
#eventDetail button {
  margin-top: 10px;
  padding: 5px 10px;
  border: 1px solid #555;
  background: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>JEONG EUNJI OFFICIAL</h1>

<div class="menu">
  <button onclick="show('schedule')">📅 스케줄</button>
  <button onclick="show('notice')">📢 공지</button>
  <button onclick="show('cheer')">🎤 응원법</button>
</div>

<!-- 스케줄 -->
<div id="schedule" class="section active">

  <div class="calendar-header">
    <button onclick="prevMonth()">◀</button>
    <h2 id="monthTitle"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div class="week">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>

  <div id="calendar" class="grid"></div>

  <!-- 스케줄 상세 -->
  <div id="eventDetail" style="display:none;">
    <h3>스케줄 상세</h3>
    <div id="eventContent"></div>
    <button onclick="closeEvent()">닫기</button>
  </div>

</div>

<!-- 공지 -->
<div id="notice" class="section">
  <h2>📢 NOTICE</h2>
  <div class="notice">[공지] 새로운 프로젝트 안내</div>
</div>

<!-- 응원법 -->
<div id="cheer" class="section">
  <h2>🎤 응원법</h2>
  <div class="cheer">정! 은! 지!</div>
</div>

</div>

<script>
// 달력용 날짜
let date = new Date();

// 예시 스케줄 데이터
const events = {
  "2026-4-4": {
    title: "Apink 8th CONCERT [The Origin : APINK] in Singapore",
    time: "오후 7시",
    place: "싱가포르 엑스포 @아레나"
  }
};

// 달력 렌더링
function renderCalendar() {
  const year = date.getFullYear();
  const month = date.getMonth();

  document.getElementById("monthTitle").innerText = `${year}년 ${month+1}월`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for(let i=0;i<firstDay;i++){
    calendar.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=lastDate;i++){
    const today = new Date();
    let isToday =
      i === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear();

    calendar.innerHTML += `<div class="day ${isToday ? 'today' : ''}" onclick="showEvent(${year}, ${month+1}, ${i})">${i}</div>`;
  }
}

// 이전/다음 달
function prevMonth(){ date.setMonth(date.getMonth() - 1); renderCalendar(); }
function nextMonth(){ date.setMonth(date.getMonth() + 1); renderCalendar(); }

// 섹션 전환
function show(section){
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById(section).classList.add('active');
}

// 이벤트 보여주기
function showEvent(y, m, d){
  const key = `${y}-${m}-${d}`;
  const event = events[key];

  if(event){
    document.getElementById("eventContent").innerHTML = `
      <strong>${event.title}</strong><br>
      시간: ${event.time}<br>
      장소: ${event.place}
    `;
  } else {
    document.getElementById("eventContent").innerHTML = "등록된 스케줄이 없습니다.";
  }

  document.getElementById("eventDetail").style.display = "block";
}

// 상세창 닫기
function closeEvent(){
  document.getElementById("eventDetail").style.display = "none";
}

// 초기 렌더링
renderCalendar();
</script>

</body>
</html>
