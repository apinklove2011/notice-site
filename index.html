<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>JEONG EUNJI OFFICIAL</title>
  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', sans-serif;
      background: linear-gradient(180deg, #000000, #1a1a1a);
      color: #ffffff;
    }

    .container {
      max-width: 720px;
      margin: 100px auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 80px;
    }

    .header h1 {
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 13px;
      color: #aaa;
    }

    .notice {
      border-bottom: 1px solid #333;
      padding: 25px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    .notice:hover {
      background: rgba(255,255,255,0.03);
      padding-left: 10px;
    }

    .tag {
      font-size: 11px;
      color: #00d9ff;
      margin-right: 8px;
    }

    .title {
      font-size: 17px;
    }

    .date {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .content {
      max-height: 0;
      overflow: hidden;
      transition: 0.4s;
      color: #ccc;
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .notice.active .content {
      max-height: 300px;
    }

    .footer {
      text-align: center;
      margin-top: 100px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>JEONG EUNJI</h1>
    <p>OFFICIAL NOTICE</p>
  </div>

  <div class="notice" onclick="toggle(this)">
    <div class="title">
      <span class="tag">[NOTICE]</span>
      새로운 프로젝트 안내
    </div>
    <div class="date">2026.03.27</div>
    <div class="content">
      새로운 작품과 관련된 일정이 곧 공개됩니다.<br>
      많은 관심 부탁드립니다.
    </div>
  </div>

  <div class="notice" onclick="toggle(this)">
    <div class="title">
      <span class="tag">[SCHEDULE]</span>
      일정 변경 안내
    </div>
    <div class="date">2026.03.25</div>
    <div class="content">
      내부 사정으로 일부 일정이 변경되었습니다.<br>
      자세한 내용은 추후 안내드립니다.
    </div>
  </div>

  <div class="notice" onclick="toggle(this)">
    <div class="title">
      <span class="tag">[MESSAGE]</span>
      팬분들께 드리는 말씀
    </div>
    <div class="date">2026.03.20</div>
    <div class="content">
      항상 응원해주셔서 감사합니다.<br>
      더 좋은 모습으로 보답하겠습니다.
    </div>
  </div>

  <div class="footer">
    © 2026 JEONG EUNJI OFFICIAL
  </div>

</div>

<script>
function toggle(el) {
  el.classList.toggle("active");
}
</script>

</body>
</html>
