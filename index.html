<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JEONG EUNJI OFFICIAL</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: 80px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  letter-spacing: 3px;
}

.calendar {
  margin-top: 50px;
}

.calendar h2 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  min-height: 80px;
  font-size: 12px;
}

.day span {
  display: block;
  font-size: 10px;
  color: #00d9ff;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>JEONG EUNJI OFFICIAL</h1>

<div class="calendar">
  <h2>📅 SCHEDULE</h2>

  <div class="grid">
    <div class="day">1</div>
    <div class="day">2<span>촬영</span></div>
    <div class="day">3</div>
    <div class="day">4<span>팬미팅</span></div>
    <div class="day">5</div>
    <div class="day">6</div>
    <div class="day">7</div>

    <div class="day">8</div>
    <div class="day">9</div>
    <div class="day">10<span>녹음</span></div>
    <div class="day">11</div>
    <div class="day">12</div>
    <div class="day">13</div>
    <div class="day">14</div>
  </div>
</div>

</div>

</body>
</html>
